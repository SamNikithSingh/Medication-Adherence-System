<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login - Smart Health</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Doctor Login</h1>
            <p class="subtitle">Enter your credentials to access the doctor portal.</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="badge badge-danger" style="display: block; text-align: center; margin-bottom: 1rem; width: 100%;">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="doctor@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login as Doctor</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="font-size: 0.875rem; color: var(--text-muted);">
                    New to Smart Health? <a href="{{ url_for('auth.doctor_register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register here</a>
                </p>
                <a href="{{ url_for('index') }}" style="display: inline-block; margin-top: 1rem; font-size: 0.875rem; color: var(--text-muted); text-decoration: none;">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
