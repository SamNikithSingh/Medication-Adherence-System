<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - Smart Health</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Patient Register</h1>
            <p class="subtitle">Join Smart Health to manage your medications effectively.</p>

            <form method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="jane@example.com" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="25" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="font-size: 0.875rem; color: var(--text-muted);">
                    Already have an account? <a href="{{ url_for('auth.patient_login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login here</a>
                </p>
                <a href="{{ url_for('index') }}" style="display: inline-block; margin-top: 1rem; font-size: 0.875rem; color: var(--text-muted); text-decoration: none;">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
